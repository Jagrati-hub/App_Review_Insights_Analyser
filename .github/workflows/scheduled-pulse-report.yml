name: Scheduled Pulse Report Generation

on:
  # Run every 3 hours (180 minutes) at 00:00, 03:00, 06:00, 09:00, 12:00, 15:00, 18:00, 21:00 UTC
  schedule:
    - cron: '0 */3 * * *'  # Every 3 hours at the top of the hour
  
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      weeks_back:
        description: 'Number of weeks to analyze'
        required: false
        default: '10'
      recipient_email:
        description: 'Recipient email address'
        required: false
        default: 'manshuc12@gmail.com'

jobs:
  generate-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create output directories
        run: |
          mkdir -p phase6/reports
          mkdir -p phase6/logs
      
      - name: Run pulse report generation
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          RECIPIENT_EMAIL: ${{ github.event.inputs.recipient_email || 'manshuc12@gmail.com' }}
          WEEKS_BACK: ${{ github.event.inputs.weeks_back || '10' }}
        run: |
          python phase6/scheduler.py --test --email "$RECIPIENT_EMAIL" --weeks "$WEEKS_BACK"
      
      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pulse-report-${{ github.run_number }}
          path: |
            phase6/reports/*.json
            phase6/reports/*.txt
            phase6/logs/*.log
          retention-days: 30
      
      - name: Commit and push reports (optional)
        if: success()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add phase6/reports/*.json phase6/reports/*.txt || true
          git commit -m "Add automated pulse report - $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push || echo "Nothing to push"
        continue-on-error: true
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Pulse report generation failed. Check logs for details."
